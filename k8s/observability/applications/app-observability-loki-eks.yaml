apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-observability-loki-eks
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.28.0
      helm:
        valueFiles:
          - $values/k8s/observability/loki/values/eks.yaml
    - repoURL: https://github.com/SergioCMDev/Infra-AWS-EKS-Python
      targetRevision: HEAD
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
