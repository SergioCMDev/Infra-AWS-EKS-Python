apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-promtail-eks
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: promtail
      targetRevision: 6.16.6
      helm:
        valueFiles:
          - $values/k8s/observability/promtail/values/eks.yaml
    - repoURL: https://github.com/SergioCMDev/Infra-AWS-EKS-Python
      targetRevision: HEAD
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
